name: Build Floorp with patch

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      publish_release:
        description: Publish a GitHub release from this workflow run
        required: false
        type: boolean
        default: true
      floorp_ref:
        description: Floorp git ref (tag/branch/commit). Empty resolves latest release tag.
        required: false
        type: string
        default: ""
      runtime_ref:
        description: Floorp-runtime git ref. Empty tries floorp_ref, then falls back to main.
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub release from this workflow run
        required: false
        default: true
        type: boolean
      floorp_ref:
        description: Floorp git ref (tag/branch/commit). Empty resolves latest release tag.
        required: false
        default: ""
        type: string
      runtime_ref:
        description: Floorp-runtime git ref. Empty tries floorp_ref, then falls back to main.
        required: false
        default: ""
        type: string

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    env:
      GITHUB_TOKEN: ${{ secrets.FLOORP_GH_TOKEN != '' && secrets.FLOORP_GH_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.FLOORP_GH_TOKEN != '' && secrets.FLOORP_GH_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Resolve Floorp/runtime refs
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          floorp_ref="${{ inputs.floorp_ref }}"
          runtime_ref="${{ inputs.runtime_ref }}"

          if [ -z "$floorp_ref" ]; then
            floorp_ref="$(git ls-remote --tags --refs https://github.com/Floorp-Projects/Floorp.git 'refs/tags/v*' | awk -F/ '{print $3}' | sort -V | tail -n1)"
          fi

          if [ -z "$floorp_ref" ]; then
            echo "Unable to resolve Floorp ref"
            exit 1
          fi

          if [ -z "$runtime_ref" ]; then
            if git ls-remote --exit-code --tags https://github.com/Floorp-Projects/Floorp-runtime.git "refs/tags/$floorp_ref" >/dev/null 2>&1; then
              runtime_ref="$floorp_ref"
            elif git ls-remote --exit-code --heads https://github.com/Floorp-Projects/Floorp-runtime.git "refs/heads/$floorp_ref" >/dev/null 2>&1; then
              runtime_ref="$floorp_ref"
            else
              runtime_ref="main"
            fi
          fi

          echo "Resolved floorp_ref=$floorp_ref runtime_ref=$runtime_ref"
          echo "floorp_ref=$floorp_ref" >> "$GITHUB_OUTPUT"
          echo "runtime_ref=$runtime_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout Floorp runtime source
        uses: actions/checkout@v4
        with:
          repository: Floorp-Projects/Floorp-runtime
          ref: ${{ steps.refs.outputs.runtime_ref }}
          path: runtime
          submodules: recursive

      - name: Checkout Floorp source
        uses: actions/checkout@v4
        with:
          repository: Floorp-Projects/Floorp
          ref: ${{ steps.refs.outputs.floorp_ref }}
          path: noraneko

      - name: Clean previous build outputs
        run: |
          sudo rm -rf \
            runtime/obj-artifact-build-output \
            runtime/release \
            runtime/artifacts \
            release \
            pkgroot \
            build \
            appimagetool-x86_64.AppImage \
            uruntime-appimage-squashfs-lite-x86_64

      - name: Install system dependencies
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "This workflow requires Ubuntu (apt-get not found)."
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y \
            msitools \
            jq \
            curl \
            rsync \
            python3 \
            unzip \
            zip \
            build-essential \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Floorp (noraneko)
        run: |
          set -euo pipefail
          cd noraneko
          printf 'GITHUB_TOKEN=%s\n' "$GITHUB_TOKEN" > .env
          deno install --allow-scripts

      - name: Apply software-volume patch to runtime source
        shell: bash
        run: |
          set -euo pipefail
          cd runtime

          if [ ! -f dom/media/AudioStream.cpp ] || [ ! -f dom/media/AudioStream.h ]; then
            echo "Runtime source does not contain expected AudioStream files"
            exit 1
          fi

          patch_log="$(mktemp)"
          if ! patch -p1 < "$GITHUB_WORKSPACE/.github/workflows/patches/software-volume.patch" >"$patch_log" 2>&1; then
            cat "$patch_log"

            # Include ordering occasionally drifts; recover known non-functional hunk mismatch.
            if grep -q 'Hunk #1 FAILED at 9\.' "$patch_log"; then
              cpp="dom/media/AudioStream.cpp"
              if ! grep -q '#include "AudioSampleFormat.h"' "$cpp"; then
                awk '
                  { print }
                  /#include "AudioConverter.h"/ {
                    print "#include \"AudioSampleFormat.h\""
                  }
                ' "$cpp" > "$cpp.tmp"
                mv "$cpp.tmp" "$cpp"
              fi
            else
              echo "Patch failed with an unexpected error"
              exit 1
            fi
          fi

          grep -Eq 'mSoftwareVolume[[:space:]]*=[[:space:]]*static_cast<float>\(aVolume \* CubebUtils::GetVolumeScale\(\)\)' dom/media/AudioStream.cpp
          grep -Eq 'AudioBufferInPlaceScale\(static_cast<AudioDataValue\*>\(aBuffer\), volume,' dom/media/AudioStream.cpp
          grep -Eq 'std::atomic<float>[[:space:]]+mSoftwareVolume\{1\.0f\};' dom/media/AudioStream.h

      - name: Bootstrap build environment
        run: |
          set -euo pipefail
          cd runtime
          ./mach --no-interactive bootstrap --application-choice browser_artifact_mode

      - name: Write Floorp versions
        run: |
          set -euo pipefail
          cd noraneko
          deno task feles-build misc writeVersion

      - name: Configure runtime for Linux artifact build
        shell: bash
        run: |
          set -euo pipefail
          cd runtime

          MOZCONFIG="./.github/workflows/mozconfigs/linux-x86_64.mozconfig"
          if [ ! -f "$MOZCONFIG" ]; then
            MOZCONFIG="./.github/workflows/mozconfigs/linux64.mozconfig"
          fi
          if [ ! -f "$MOZCONFIG" ]; then
            echo "Linux mozconfig not found in runtime repository"
            exit 1
          fi

          cp "$MOZCONFIG" mozconfig

          # Artifact builds are incompatible with some updater/release flags from
          # runtime mozconfigs. Strip them before appending our CI options.
          sed -i 's|^[[:space:]]*ac_add_options --disable-updater.*$||g' mozconfig
          sed -i 's|^[[:space:]]*ac_add_options --enable-unverified-updates.*$||g' mozconfig
          sed -i 's|^[[:space:]]*ac_add_options --enable-chrome-format=flat.*$||g' mozconfig
          sed -i 's|^[[:space:]]*ac_add_options --enable-update-channel=.*$||g' mozconfig
          sed -i 's|^[[:space:]]*ac_add_options --with-branding=.*$||g' mozconfig

          if [ -d "./.github/assets/branding" ]; then
            cp -r ./.github/assets/branding/* ./browser/branding/
          fi
          if [ -d "$GITHUB_WORKSPACE/noraneko/static/gecko/branding" ]; then
            cp -r "$GITHUB_WORKSPACE/noraneko/static/gecko/branding"/* ./browser/branding/
          fi

          AUTOGEN_DIR="$GITHUB_WORKSPACE/noraneko/static/gecko/config/autogenerated"
          mkdir -p "$AUTOGEN_DIR"
          echo "$(cat "$GITHUB_WORKSPACE/noraneko/static/gecko/config/version.txt")@$(cat ./browser/config/version.txt)" > "$AUTOGEN_DIR/version.txt"
          echo "$(cat "$GITHUB_WORKSPACE/noraneko/static/gecko/config/version_display.txt")@$(cat ./browser/config/version_display.txt)" > "$AUTOGEN_DIR/version_display.txt"

          cat >> mozconfig <<'EOF'
          ac_add_options --with-version-file-path=noraneko/static/gecko/config/autogenerated
          ac_add_options --enable-release
          ac_add_options --disable-tests
          ac_add_options --enable-artifact-builds
          mk_add_options MOZ_OBJDIR=./obj-artifact-build-output
          EOF

          ./mach configure

      - name: Build Floorp frontend artifacts (before-mach)
        run: |
          set -euo pipefail
          cd noraneko
          NODE_ENV='production' deno task feles-build build --phase before-mach

      - name: Download runtime artifact tarball
        id: runtime_artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/artifacts"

          ref="${{ steps.refs.outputs.runtime_ref }}"
          names=(
            "floorp-linux-x86_64-moz-artifact.tar.xz"
            "noraneko-linux-x86_64-moz-artifact.tar.xz"
          )

          found=""
          for name in "${names[@]}"; do
            tag_url="https://github.com/Floorp-Projects/Floorp-runtime/releases/download/${ref}/${name}"
            latest_url="https://github.com/Floorp-Projects/Floorp-runtime/releases/latest/download/${name}"
            if curl -fL "$tag_url" -o "$HOME/artifacts/$name"; then
              found="$HOME/artifacts/$name"
              break
            fi
            if curl -fL "$latest_url" -o "$HOME/artifacts/$name"; then
              found="$HOME/artifacts/$name"
              break
            fi
          done

          if [ -z "$found" ]; then
            echo "Unable to download Floorp runtime artifact tarball"
            exit 1
          fi

          echo "artifact_path=$found" >> "$GITHUB_OUTPUT"

      - name: Build runtime with downloaded artifact
        run: |
          set -euo pipefail
          cd runtime
          MOZ_ARTIFACT_FILE="${{ steps.runtime_artifact.outputs.artifact_path }}" ./mach build

      - name: Inject Floorp changes (after-mach)
        shell: bash
        run: |
          set -euo pipefail

          DIST_ROOT="$GITHUB_WORKSPACE/runtime/obj-artifact-build-output/dist"
          PATCH_TARGET="$DIST_ROOT/bin"
          BUILDID2_SRC="$GITHUB_WORKSPACE/noraneko/_dist/buildid2"
          INJECTOR_DIST_BRIDGE="$GITHUB_WORKSPACE/obj-artifact-build-output"

          copy_buildid2() {
            local dest_root="$1"
            if [ ! -f "$BUILDID2_SRC" ] || [ ! -d "$dest_root" ]; then
              return 0
            fi
            mkdir -p "$dest_root/browser"
            cp "$BUILDID2_SRC" "$dest_root/browser/buildid2"
          }

          # Floorp injector expects dist under $GITHUB_WORKSPACE/obj-artifact-build-output.
          # Our runtime build writes to runtime/obj-artifact-build-output, so bridge it.
          if [ -L "$INJECTOR_DIST_BRIDGE" ]; then
            rm -f "$INJECTOR_DIST_BRIDGE"
          fi
          ln -s "$GITHUB_WORKSPACE/runtime/obj-artifact-build-output" "$INJECTOR_DIST_BRIDGE"

          cd "$GITHUB_WORKSPACE/noraneko"
          deno task feles-build build --phase after-mach

          rsync -aL "$PATCH_TARGET/" "$DIST_ROOT/tmp__bin"
          rm -rf "$PATCH_TARGET"
          mv "$DIST_ROOT/tmp__bin" "$PATCH_TARGET"

          # Some Floorp UI patches can drift between releases. Apply them best-effort
          # so the core patched browser build can continue.
          shopt -s nullglob
          for patch_file in ./tools/patches/*.patch; do
            echo "Applying optional Floorp patch: $patch_file"
            if ! git apply --reject --unsafe-paths --directory "$PATCH_TARGET" --check "$patch_file"; then
              echo "Warning: patch check failed for $patch_file, skipping."
              continue
            fi
            if ! git apply --reject --unsafe-paths --directory "$PATCH_TARGET" "$patch_file"; then
              echo "Warning: patch apply failed for $patch_file, continuing."
            fi
          done
          shopt -u nullglob || true

          copy_buildid2 "$PATCH_TARGET"
          for candidate in "$DIST_ROOT/floorp" "$DIST_ROOT/noraneko"; do
            copy_buildid2 "$candidate"
          done

      - name: Apply Firefox preference overrides
        shell: bash
        run: |
          set -euo pipefail
          cd noraneko

          CANDIDATES=(
            "../runtime/obj-artifact-build-output/dist/bin/browser/defaults/preferences/firefox.js"
            "../runtime/obj-artifact-build-output/dist/noraneko/browser/defaults/preferences/firefox.js"
            "../runtime/obj-artifact-build-output/dist/floorp/browser/defaults/preferences/firefox.js"
          )

          FIREFOX_JS_PATH=""
          for candidate in "${CANDIDATES[@]}"; do
            if [ -f "$candidate" ]; then
              FIREFOX_JS_PATH="$candidate"
              break
            fi
          done

          if [ -n "$FIREFOX_JS_PATH" ]; then
            ./static/gecko/pref/override.sh "$FIREFOX_JS_PATH"
          else
            echo "Warning: firefox.js not found in expected locations"
          fi

      - name: Package Floorp
        run: |
          set -euo pipefail
          cd runtime
          ./mach package

      - name: Prepare Floorp dist payload
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="$(cat noraneko/static/gecko/config/version.txt | tr -d '\n\r')"
          floorp_ref="${{ steps.refs.outputs.floorp_ref }}"

          dist_bin="runtime/obj-artifact-build-output/dist/bin"
          if [ ! -d "$dist_bin" ]; then
            echo "No Floorp dist/bin directory found under runtime/obj-artifact-build-output/dist"
            exit 1
          fi

          portable_dir="$RUNNER_TEMP/floorp-dist-portable"
          rm -rf "$portable_dir"
          mkdir -p "$portable_dir"
          cp -aL "$dist_bin"/. "$portable_dir"/

          artifact_basename="floorp-patched-${version}-${floorp_ref}"

          echo "dist_dir=$portable_dir" >> "$GITHUB_OUTPUT"
          echo "app_version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=$artifact_basename" >> "$GITHUB_OUTPUT"

      - name: Build distributable packages
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.package.outputs.app_version }}"
          ARTIFACT_BASENAME="${{ steps.package.outputs.artifact_basename }}"
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"

          mkdir -p release
          tar -cJf "release/${ARTIFACT_BASENAME}-linux-x86_64.tar.xz" -C "$DIST_DIR" .

          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm zstd libarchive-tools
          sudo gem install --no-document fpm

          rm -rf pkgroot
          mkdir -p pkgroot/usr/lib/floorp-patched pkgroot/usr/bin
          cp -a "$DIST_DIR"/. pkgroot/usr/lib/floorp-patched/

          if [ -e pkgroot/usr/lib/floorp-patched/firefox ]; then
            ln -s ../lib/floorp-patched/firefox pkgroot/usr/bin/floorp
          elif [ -e pkgroot/usr/lib/floorp-patched/bin/firefox ]; then
            ln -s ../lib/floorp-patched/bin/firefox pkgroot/usr/bin/floorp
          fi

          if [ -e pkgroot/usr/lib/floorp-patched/firefox-bin ]; then
            ln -s ../lib/floorp-patched/firefox-bin pkgroot/usr/bin/floorp-bin
          elif [ -e pkgroot/usr/lib/floorp-patched/bin/firefox-bin ]; then
            ln -s ../lib/floorp-patched/bin/firefox-bin pkgroot/usr/bin/floorp-bin
          fi

          fpm -s dir -t deb -n floorp-patched -v "$VERSION" -C pkgroot -p "release/${ARTIFACT_BASENAME}-amd64.deb" usr
          fpm -s dir -t rpm -n floorp-patched -v "$VERSION" -C pkgroot -p "release/${ARTIFACT_BASENAME}-x86_64.rpm" usr
          fpm -s dir -t pacman -n floorp-patched -v "$VERSION" -C pkgroot -p "release/${ARTIFACT_BASENAME}-x86_64.pkg.tar.zst" usr

      - name: Build AppImage (best effort)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ARCH="x86_64"
          APPDIR="build/AppDir"
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"
          ARTIFACT_BASENAME="${{ steps.package.outputs.artifact_basename }}"
          APPIMAGE_NAME="${ARTIFACT_BASENAME}-${ARCH}.AppImage"
          APPIMAGE_ZSYNC_NAME="${APPIMAGE_NAME}.zsync"

          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream file
          if ! sudo apt-get install -y libfuse2; then
            sudo apt-get install -y libfuse2t64
          fi

          rm -rf "$APPDIR"
          mkdir -p "$APPDIR" release
          cp -a "$DIST_DIR"/. "$APPDIR"/

          DESKTOP_FILE="$(find "$APPDIR" -maxdepth 3 -type f -name "*.desktop" | head -n 1 || true)"
          if [ -z "${DESKTOP_FILE:-}" ]; then
            mkdir -p "$APPDIR/usr/share/applications"
            DESKTOP_FILE="$APPDIR/usr/share/applications/floorp-patched.desktop"
            printf '%s\n' \
              '[Desktop Entry]' \
              'Type=Application' \
              'Name=Floorp Patched' \
              'Exec=floorp' \
              'Icon=floorp' \
              'Categories=Network;WebBrowser;' \
              > "$DESKTOP_FILE"
          fi

          app_exec=""
          for candidate in firefox floorp firefox-bin bin/firefox bin/floorp bin/firefox-bin; do
            if [ -x "$APPDIR/$candidate" ]; then
              app_exec="$candidate"
              break
            fi
          done

          if [ -z "${app_exec:-}" ]; then
            app_exec=$(find "$APPDIR/bin" -maxdepth 1 -type f -executable 2>/dev/null | head -n 1 | sed "s|$APPDIR/||" || true)
          fi

          if [ -z "${app_exec:-}" ]; then
            echo "AppImage: could not find executable in $APPDIR"
            ls -lah "$APPDIR" || true
            exit 0
          fi

          mkdir -p "$APPDIR/usr/share/icons/hicolor/128x128/apps"
          icon_path=$(find "$APPDIR" -type f \( -name '*128*.png' -o -name '*256*.png' -o -name '*.png' \) | head -n 1 || true)
          if [ -n "${icon_path:-}" ]; then
            cp "$icon_path" "$APPDIR/usr/share/icons/hicolor/128x128/apps/floorp.png"
            cp "$icon_path" "$APPDIR/floorp.png"
            ln -sf floorp.png "$APPDIR/.DirIcon"
          fi

          cp "$DESKTOP_FILE" "$APPDIR/floorp.desktop"
          sed -i -E 's/^Exec=.*/Exec=floorp-patched/; s/^Icon=.*/Icon=floorp/' "$APPDIR/floorp.desktop"

          printf '#!/bin/sh\nexec "$APPDIR/%s" "$@"\n' "$app_exec" > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          UPINFO="gh-releases-zsync|$GITHUB_REPOSITORY_OWNER|AudioStreamPatcher|latest|${APPIMAGE_ZSYNC_NAME}"
          wget "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool-x86_64.AppImage
          wget "https://github.com/VHSgunzo/uruntime/releases/latest/download/uruntime-appimage-squashfs-lite-$ARCH" -O "uruntime-appimage-squashfs-lite-$ARCH"
          chmod +x appimagetool-x86_64.AppImage "uruntime-appimage-squashfs-lite-$ARCH"
          sed -i 's|URUNTIME_MOUNT=[0-9]|URUNTIME_MOUNT=0|' "uruntime-appimage-squashfs-lite-$ARCH" || true

          ./appimagetool-x86_64.AppImage -u "$UPINFO" "$APPDIR" "$APPIMAGE_NAME" --runtime-file "./uruntime-appimage-squashfs-lite-$ARCH"
          mv -f "$APPIMAGE_NAME" release/
          if [ -f "$APPIMAGE_ZSYNC_NAME" ]; then
            mv -f "$APPIMAGE_ZSYNC_NAME" release/
          fi

      - name: Build Flatpak bundle (best effort)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"
          ARTIFACT_BASENAME="${{ steps.package.outputs.artifact_basename }}"
          FLATPAK_BUILD_DIR="$RUNNER_TEMP/flatpak-build"
          FLATPAK_REPO_DIR="$RUNNER_TEMP/flatpak-repo"
          FLATPAK_STATE_DIR="$RUNNER_TEMP/flatpak-state"

          if [ ! -d "${DIST_DIR:-}" ]; then
            echo "Missing DIST_DIR from build output. Skipping Flatpak bundle."
            exit 0
          fi

          sudo rm -rf "$FLATPAK_BUILD_DIR" "$FLATPAK_REPO_DIR" "$FLATPAK_STATE_DIR"
          mkdir -p "$FLATPAK_BUILD_DIR" "$FLATPAK_REPO_DIR" "$FLATPAK_STATE_DIR"

          manifest_template=".github/workflows/flatpak/org.floorp.floorppatch.yml"
          if [ ! -f "$manifest_template" ]; then
            echo "Missing Flatpak manifest template: $manifest_template"
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream-compose

          if ! sudo flatpak remotes --system --columns=name | grep -qx flathub; then
            sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          fi

          runtime=$(awk -F': *' '/^[[:space:]]*runtime:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")
          sdk=$(awk -F': *' '/^[[:space:]]*sdk:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")
          runtime_version=$(awk -F': *' '/^[[:space:]]*runtime-version:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")

          arch="x86_64"
          echo "Flatpak manifest runtime=${runtime:-<empty>} sdk=${sdk:-<empty>} runtime-version=${runtime_version:-<empty>} arch=$arch"

          if [ -z "${runtime:-}" ] || [ -z "${sdk:-}" ] || [ -z "${runtime_version:-}" ]; then
            echo "Manifest is missing runtime/sdk/runtime-version. Cannot preinstall Flatpak deps."
            exit 1
          fi

          runtime_ref="${runtime}/${arch}/${runtime_version}"
          sdk_ref="${sdk}/${arch}/${runtime_version}"

          sudo flatpak install -y --system flathub "$runtime_ref" "$sdk_ref"
          sudo flatpak install -y --system flathub "${runtime}.Locale/${arch}/${runtime_version}" || true

          sudo flatpak info --system "$runtime_ref"
          sudo flatpak info --system "$sdk_ref"

          flatpak_stage="$RUNNER_TEMP/flatpak-src"
          flatpak_src="$RUNNER_TEMP/floorp.linux-x86_64.tar.xz"
          rm -rf "$flatpak_stage"
          mkdir -p "$flatpak_stage/firefox"
          cp -a "$DIST_DIR"/. "$flatpak_stage/firefox"/
          tar -cJf "$flatpak_src" -C "$flatpak_stage" firefox
          flatpak_sha=$(sha256sum "$flatpak_src" | awk '{print $1}')

          patched_manifest="$RUNNER_TEMP/floorp-flatpak.patched.yml"
          sed \
            -e "s|__FIREFOX_TAR_PATH__|$flatpak_src|g" \
            -e "s|__FIREFOX_TAR_SHA256__|$flatpak_sha|g" \
            "$manifest_template" > "$patched_manifest"

          echo "Using patched Flatpak manifest with local source: $patched_manifest"

          sudo flatpak-builder --state-dir="$FLATPAK_STATE_DIR" --install-deps-from=flathub --repo="$FLATPAK_REPO_DIR" --force-clean "$FLATPAK_BUILD_DIR" "$patched_manifest"
          mkdir -p release
          sudo flatpak build-bundle "$FLATPAK_REPO_DIR" "release/${ARTIFACT_BASENAME}.flatpak" org.floorp.floorppatch
          sudo chown -R "$(id -u):$(id -g)" release || true

      - uses: actions/upload-artifact@v4
        with:
          name: floorp-patched-${{ steps.package.outputs.app_version }}
          path: release/*

      - name: Publish GitHub release
        if: success() && github.event_name == 'workflow_call' && inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: floorp-build-${{ github.run_number }}
          name: Floorp Build ${{ github.run_number }}
          make_latest: false
          generate_release_notes: true
          files: |
            release/*