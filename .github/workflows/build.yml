name: Build Zen with patch

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4  # your repo, just contains the patch + scripts

      - name: Install system dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y \
              libasound2-dev \
              libpulse-dev \
              libgtk-3-dev \
              libxkbcommon-dev \
              libpango1.0-dev \
              libx11-dev \
              libxcb1-dev \
              libxcb-shm0-dev \
              libx11-xcb-dev \
              libxext-dev \
              libxrandr-dev \
              libxcomposite-dev \
              libxcursor-dev \
              libxdamage-dev \
              libxfixes-dev \
              libxi-dev \
              nasm
          elif command -v emerge >/dev/null 2>&1; then
            sudo emerge --quiet --noreplace \
              media-libs/alsa-lib \
              media-sound/pulseaudio \
              x11-libs/gtk+ \
              x11-libs/libxkbcommon \
              x11-libs/pango \
              x11-libs/libX11 \
              x11-libs/libxcb \
              x11-libs/libXext \
              x11-libs/libXrandr \
              x11-libs/libXcomposite \
              x11-libs/libXcursor \
              x11-libs/libXdamage \
              x11-libs/libXfixes \
              x11-libs/libXi \
              media-video/nasm
          else
            echo "Unsupported package manager on runner. Expected apt-get or emerge."
            exit 1
          fi

      - name: Install cbindgen
        run: |
          cargo install cbindgen --version 0.29.1 --locked --force
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Clone Zen
        run: git clone https://github.com/zen-browser/desktop.git --depth 10 zen

      - name: Install deps and build
        run: |
          cd zen
          npm i
          npm run init

      - name: Apply patch
        run: |
          cd zen/engine
          patch -p1 < ../../.github/workflows/patches/software-volume.patch

      - name: Adjust mozconfig for CI
        run: |
          cd zen
          for cfg in configs/common/mozconfig configs/linux/mozconfig; do
            if [ -f "$cfg" ] && ! grep -q -- "--without-wasm-sandboxed-libraries" "$cfg"; then
              echo "ac_add_options --without-wasm-sandboxed-libraries" >> "$cfg"
            fi
          done

      - name: Build
        run: |
          cd zen
          npm run build

      - name: Package artifact
        run: |
          dist_dir=$(find zen -maxdepth 4 -type d -path "*/obj-*/dist" | head -n 1)
          if [ -z "$dist_dir" ]; then
            echo "No build dist directory found under zen/obj-*/dist"
            exit 1
          fi
          tar czf zen-patched.tar.gz -C "$dist_dir" .

      - uses: actions/upload-artifact@v4
        with:
          name: zen-patched
          path: zen-patched.tar.gz