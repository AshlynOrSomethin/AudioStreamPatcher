name: Build Zen with patch

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4  # your repo, just contains the patch + scripts

      - name: Install system dependencies
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "This workflow requires Ubuntu (apt-get not found)."
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libgtk-3-dev \
            libxkbcommon-dev \
            libpango1.0-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxi-dev \
            nasm \
            clang \
            libclang-dev \
            llvm \
            llvm-dev

      - name: Install cbindgen
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup component add rustfmt
          elif ! command -v rustfmt >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rustfmt
          fi
          cargo install cbindgen --version 0.29.1 --locked --force
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Clone Zen
        run: git clone https://github.com/zen-browser/desktop.git --depth 10 zen

      - name: Install deps and build
        run: |
          cd zen
          npm i
          npm run init

      - name: Apply patch
        run: |
          cd zen/engine
          patch -p1 < ../../.github/workflows/patches/software-volume.patch

      - name: Adjust mozconfig for CI
        run: |
          cd zen
          for cfg in configs/common/mozconfig configs/linux/mozconfig; do
            if [ -f "$cfg" ] && ! grep -q -- "--without-wasm-sandboxed-libraries" "$cfg"; then
              echo "ac_add_options --without-wasm-sandboxed-libraries" >> "$cfg"
            fi
          done

      - name: Build
        run: |
          cd zen
          npm run build

      - name: Package artifact
        id: package
        run: |
          dist_dir=$(find zen -maxdepth 4 -type d -path "*/obj-*/dist" | head -n 1)
          if [ -z "$dist_dir" ]; then
            echo "No build dist directory found under zen/obj-*/dist"
            exit 1
          fi
          tar czf zen-patched.tar.gz -C "$dist_dir" .
          echo "dist_dir=$dist_dir" >> "$GITHUB_OUTPUT"

      - name: Build distributable packages
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"
          mkdir -p release
          cp zen-patched.tar.gz release/
          tar --zstd -cf release/zen-patched-linux-x86_64.tar.zst -C "$DIST_DIR" .
          cp release/zen-patched-linux-x86_64.tar.zst release/zen-patched-linux-x86_64.pkg.tar.zst

          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm zstd
          sudo gem install --no-document fpm

          rm -rf pkgroot
          mkdir -p pkgroot/opt/zen-patched
          cp -a "$DIST_DIR"/. pkgroot/opt/zen-patched/

          fpm -s dir -t deb -n zen-patched -v "$VERSION" -C pkgroot -p "release/zen-patched_${VERSION}_amd64.deb" opt
          fpm -s dir -t rpm -n zen-patched -v "$VERSION" -C pkgroot -p "release/zen-patched-${VERSION}.x86_64.rpm" opt

      - name: Build AppImage (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"

          if [ -x "$DIST_DIR/zen" ]; then
            BIN_NAME="zen"
          elif [ -x "$DIST_DIR/zen-bin" ]; then
            BIN_NAME="zen-bin"
          else
            echo "No known executable found for AppImage packaging. Skipping."
            exit 0
          fi

          rm -rf AppDir
          mkdir -p AppDir/usr/bin AppDir/usr/lib/zen-patched AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -a "$DIST_DIR"/. AppDir/usr/lib/zen-patched/
          ln -sf "../lib/zen-patched/$BIN_NAME" AppDir/usr/bin/zen-patched

          cat > AppDir/AppRun <<EOF
#!/bin/sh
exec "\$APPDIR/usr/lib/zen-patched/$BIN_NAME" "\$@"
EOF
          chmod +x AppDir/AppRun

          cat > AppDir/usr/share/applications/zen-patched.desktop <<EOF
[Desktop Entry]
Type=Application
Name=Zen Patched
Exec=zen-patched
Icon=zen-patched
Categories=Network;WebBrowser;
EOF

          icon_path=$(find "$DIST_DIR" -type f \( -name "*256*.png" -o -name "*.png" \) | head -n 1 || true)
          if [ -n "${icon_path:-}" ]; then
            cp "$icon_path" AppDir/usr/share/icons/hicolor/256x256/apps/zen-patched.png
          fi

          curl -L -o appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir "release/zen-patched-${VERSION}-x86_64.AppImage"

      - name: Build Flatpak bundle (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ -f zen/build/flatpak/app.zen_browser.zen.yml ]; then
            manifest="zen/build/flatpak/app.zen_browser.zen.yml"
          elif [ -f zen/build/flatpak/app.zen_browser.zen.yml.template ]; then
            cp zen/build/flatpak/app.zen_browser.zen.yml.template /tmp/zen-flatpak.yml
            manifest="/tmp/zen-flatpak.yml"
          else
            echo "No Flatpak manifest found. Skipping."
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak-builder --force-clean flatpak-build "$manifest"
          mkdir -p release
          flatpak build-bundle "$HOME/.local/share/flatpak/repo" release/zen-patched.flatpak app.zen_browser.zen

      - uses: actions/upload-artifact@v4
        with:
          name: zen-patched
          path: "release/*"

      - name: Publish GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          generate_release_notes: true
          files: |
            release/*