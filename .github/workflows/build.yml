name: Build Zen with patch

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4  # your repo, just contains the patch + scripts
        with:
          clean: false

      - name: Clean previous build outputs
        run: |
          sudo rm -rf \
            zen \
            build \
            release \
            pkgroot \
            appimage-input \
            appimage-root \
            appimagetool-x86_64.AppImage \
            uruntime-appimage-squashfs-lite-x86_64 \
            zen-patched.tar.gz \
            .flatpak-builder \
            flatpak-build \
            flatpak-repo

      - name: Install system dependencies
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "This workflow requires Ubuntu (apt-get not found)."
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libpulse-dev \
            libgtk-3-dev \
            libxkbcommon-dev \
            libpango1.0-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxrandr-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxi-dev \
            nasm \
            clang-17 \
            libclang-17-dev \
            llvm-17 \
            llvm-17-dev

          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-17 170
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-17 170
          sudo update-alternatives --install /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-17 170

      - name: Install cbindgen
        run: |
          if command -v rustup >/dev/null 2>&1; then
            rustup component add rustfmt
          elif ! command -v rustfmt >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rustfmt
          fi
          cargo install cbindgen --version 0.29.1 --locked --force
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clone Zen
        run: git clone https://github.com/zen-browser/desktop.git --depth 10 zen

      - name: Install deps and build
        run: |
          cd zen
          npm i
          npm run init

      - name: Apply patch
        run: |
          cd zen/engine
          patch -p1 < ../../.github/workflows/patches/software-volume.patch

      - name: Update en-US packs
        run: |
          cd zen
          python3 ./scripts/update_en_US_packs.py

      - name: Adjust mozconfig for CI
        run: |
          cd zen
          for cfg in configs/common/mozconfig configs/linux/mozconfig; do
            if [ -f "$cfg" ] && ! grep -q -- "--without-wasm-sandboxed-libraries" "$cfg"; then
              echo "ac_add_options --without-wasm-sandboxed-libraries" >> "$cfg"
            fi
          done

      - name: Build
        run: |
          cd zen
          npm run build

      - name: Package artifact
        id: package
        run: |
          dist_dir=$(find zen -maxdepth 4 -type d -path "*/obj-*/dist" | head -n 1)
          if [ -z "$dist_dir" ]; then
            echo "No build dist directory found under zen/obj-*/dist"
            exit 1
          fi

          # Create a portable staging directory with symlinks resolved.
          # Some files in dist/bin (for example dependentlibs.list) are build-tree symlinks.
          # If we archive raw dist, those links break after extraction and XPCOM fails to load.
          portable_dir="$RUNNER_TEMP/zen-dist-portable"
          rm -rf "$portable_dir"
          mkdir -p "$portable_dir"
          cp -aL "$dist_dir"/. "$portable_dir"/

          tar czf zen-patched.tar.gz -C "$portable_dir" .
          echo "dist_dir=$portable_dir" >> "$GITHUB_OUTPUT"

      - name: Build distributable packages
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"
          mkdir -p release
          cp zen-patched.tar.gz release/
          tar --zstd -cf release/zen-patched-linux-x86_64.tar.zst -C "$DIST_DIR" .
          cp release/zen-patched-linux-x86_64.tar.zst release/zen-patched-linux-x86_64.pkg.tar.zst

          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm zstd
          sudo gem install --no-document fpm

          rm -rf pkgroot
          mkdir -p pkgroot/opt/zen-patched
          cp -a "$DIST_DIR"/. pkgroot/opt/zen-patched/

          fpm -s dir -t deb -n zen-patched -v "$VERSION" -C pkgroot -p "release/zen-patched_${VERSION}_amd64.deb" opt
          fpm -s dir -t rpm -n zen-patched -v "$VERSION" -C pkgroot -p "release/zen-patched-${VERSION}.x86_64.rpm" opt

      - name: Build AppImage (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          ARCH="x86_64"
          APPDIR="build/AppDir"
          INPUT_TAR="release/zen-patched-linux-x86_64.tar.zst"

          if [ ! -f "$INPUT_TAR" ]; then
            echo "Missing AppImage input tarball: $INPUT_TAR"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y desktop-file-utils appstream file
          if ! sudo apt-get install -y libfuse2; then
            sudo apt-get install -y libfuse2t64
          fi

          rm -rf "$APPDIR" appimage-root appimage-input
          mkdir -p "$APPDIR" appimage-root appimage-input release

          tar --zstd -xf "$INPUT_TAR" -C appimage-input

          if [ -d appimage-input/zen ]; then
            cp -a appimage-input/zen/. "$APPDIR"/
          else
            cp -a appimage-input/. "$APPDIR"/
          fi

          DESKTOP_FILE="$(find "$APPDIR" -maxdepth 3 -type f -name "*.desktop" | head -n 1 || true)"
          if [ -z "${DESKTOP_FILE:-}" ]; then
            mkdir -p "$APPDIR/usr/share/applications"
            DESKTOP_FILE="$APPDIR/usr/share/applications/zen-patched.desktop"
            printf '%s\n' \
              '[Desktop Entry]' \
              'Type=Application' \
              'Name=Zen Patched' \
              'Exec=zen' \
              'Icon=zen' \
              'Categories=Network;WebBrowser;' \
              > "$DESKTOP_FILE"
          fi

          app_exec_raw=$(awk -F= '/^Exec=/{print $2; exit}' "$DESKTOP_FILE" | sed -E 's/[[:space:]]+%[A-Za-z]//g' | awk '{print $1}' || true)
          app_exec=""

          if [ -n "${app_exec_raw:-}" ]; then
            for probe in "$app_exec_raw" "$(basename "$app_exec_raw")" "bin/$app_exec_raw" "bin/$(basename "$app_exec_raw")"; do
              if [ -x "$APPDIR/$probe" ]; then
                app_exec="$probe"
                break
              fi
            done
          fi

          if [ -z "${app_exec:-}" ]; then
            for candidate in zen zen-bin firefox firefox-bin browser bin/zen bin/zen-bin bin/firefox bin/firefox-bin; do
              if [ -x "$APPDIR/$candidate" ]; then
                app_exec="$candidate"
                break
              fi
            done
          fi

          if [ -z "${app_exec:-}" ]; then
            app_exec=$(find "$APPDIR/bin" -maxdepth 1 -type f -executable 2>/dev/null | head -n 1 | sed "s|$APPDIR/||" || true)
          fi

          if [ -z "${app_exec:-}" ]; then
            app_exec=$(find "$APPDIR" -maxdepth 1 -type f -executable | head -n 1 | sed "s|$APPDIR/||" || true)
          fi

          if [ -z "${app_exec:-}" ]; then
            echo "AppImage: could not find executable in $APPDIR"
            ls -lah "$APPDIR" || true
            exit 0
          fi

          mkdir -p "$APPDIR/usr/share/icons/hicolor/128x128/apps"
          icon_path=$(find "$APPDIR" -type f \( -name "*128*.png" -o -name "*256*.png" -o -name "*.png" \) | head -n 1 || true)
          if [ -n "${icon_path:-}" ]; then
            cp "$icon_path" "$APPDIR/usr/share/icons/hicolor/128x128/apps/zen.png"
            cp "$icon_path" "$APPDIR/zen.png"
            ln -sf zen.png "$APPDIR/.DirIcon"
          fi

          cp "$DESKTOP_FILE" "$APPDIR/zen.desktop"
          sed -i -E 's/^Exec=.*/Exec=zen-patched/; s/^Icon=.*/Icon=zen/' "$APPDIR/zen.desktop"

          printf '#!/bin/sh\nexec "$APPDIR/%s" "$@"\n' "$app_exec" > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          UPINFO="gh-releases-zsync|$GITHUB_REPOSITORY_OWNER|AudioStreamPatcher|latest|zen-patched-${ARCH}.AppImage.zsync"
          wget "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool-x86_64.AppImage
          wget "https://github.com/VHSgunzo/uruntime/releases/latest/download/uruntime-appimage-squashfs-lite-$ARCH" -O "uruntime-appimage-squashfs-lite-$ARCH"
          chmod +x appimagetool-x86_64.AppImage "uruntime-appimage-squashfs-lite-$ARCH"
          sed -i 's|URUNTIME_MOUNT=[0-9]|URUNTIME_MOUNT=0|' "uruntime-appimage-squashfs-lite-$ARCH" || true

          ./appimagetool-x86_64.AppImage -u "$UPINFO" "$APPDIR" "zen-patched-${ARCH}.AppImage" --runtime-file "./uruntime-appimage-squashfs-lite-$ARCH"
          mv -f zen-patched-${ARCH}.AppImage release/
          if [ -f "zen-patched-${ARCH}.AppImage.zsync" ]; then
            mv -f "zen-patched-${ARCH}.AppImage.zsync" release/
          fi

      - name: Build Flatpak bundle (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          DIST_DIR="${{ steps.package.outputs.dist_dir }}"
          FLATPAK_BUILD_DIR="$RUNNER_TEMP/flatpak-build"
          FLATPAK_REPO_DIR="$RUNNER_TEMP/flatpak-repo"
          FLATPAK_STATE_DIR="$RUNNER_TEMP/flatpak-state"

          if [ ! -d "${DIST_DIR:-}" ]; then
            echo "Missing DIST_DIR from build output. Skipping Flatpak bundle."
            exit 0
          fi

          sudo rm -rf "$FLATPAK_BUILD_DIR" "$FLATPAK_REPO_DIR" "$FLATPAK_STATE_DIR"
          mkdir -p "$FLATPAK_BUILD_DIR" "$FLATPAK_REPO_DIR" "$FLATPAK_STATE_DIR"

          manifest_template=".github/workflows/flatpak/app.zen_browser.zenpatch.yml"
          if [ ! -f "$manifest_template" ]; then
            echo "Missing Flatpak manifest template: $manifest_template"
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

          if ! sudo flatpak remotes --system --columns=name | grep -qx flathub; then
            sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          fi

          runtime=$(awk -F': *' '/^[[:space:]]*runtime:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")
          sdk=$(awk -F': *' '/^[[:space:]]*sdk:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")
          runtime_version=$(awk -F': *' '/^[[:space:]]*runtime-version:[[:space:]]*/ {v=$2; gsub(/^[[:space:]]+|[[:space:]]+$/, "", v); gsub(/^["'"'"']|["'"'"']$/, "", v); print v; exit}' "$manifest_template")

          arch="x86_64"
          echo "Flatpak manifest runtime=${runtime:-<empty>} sdk=${sdk:-<empty>} runtime-version=${runtime_version:-<empty>} arch=$arch"

          if [ -z "${runtime:-}" ] || [ -z "${sdk:-}" ] || [ -z "${runtime_version:-}" ]; then
            echo "Manifest is missing runtime/sdk/runtime-version. Cannot preinstall Flatpak deps."
            exit 1
          fi

          runtime_ref="${runtime}/${arch}/${runtime_version}"
          sdk_ref="${sdk}/${arch}/${runtime_version}"

          sudo flatpak install -y --system flathub "$runtime_ref" "$sdk_ref"
          sudo flatpak install -y --system flathub "${runtime}.Locale/${arch}/${runtime_version}" || true

          sudo flatpak info --system "$runtime_ref"
          sudo flatpak info --system "$sdk_ref"

          flatpak_stage="$RUNNER_TEMP/flatpak-src"
          flatpak_src="$RUNNER_TEMP/zen.linux-x86_64.tar.xz"
          rm -rf "$flatpak_stage"
          mkdir -p "$flatpak_stage/zen"
          cp -a "$DIST_DIR"/. "$flatpak_stage/zen"/
          tar -cJf "$flatpak_src" -C "$flatpak_stage" zen
          flatpak_sha=$(sha256sum "$flatpak_src" | awk '{print $1}')

          patched_manifest="$RUNNER_TEMP/zen-flatpak.patched.yml"
          sed \
            -e "s|__ZEN_TAR_PATH__|$flatpak_src|g" \
            -e "s|__ZEN_TAR_SHA256__|$flatpak_sha|g" \
            "$manifest_template" > "$patched_manifest"

          echo "Using patched Flatpak manifest with local source: $patched_manifest"

          sudo flatpak-builder --state-dir="$FLATPAK_STATE_DIR" --install-deps-from=flathub --repo="$FLATPAK_REPO_DIR" --force-clean "$FLATPAK_BUILD_DIR" "$patched_manifest"
          mkdir -p release
          sudo flatpak build-bundle "$FLATPAK_REPO_DIR" release/zen-patched.flatpak app.zen_browser.zenpatch
          sudo chown -R "$(id -u):$(id -g)" release || true

      - uses: actions/upload-artifact@v4
        with:
          name: zen-patched
          path: "release/*"

      - name: Publish GitHub release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/*