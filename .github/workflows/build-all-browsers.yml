name: Build All Browsers (Zen + Firefox + Firefox ESR)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  zen:
    name: Build Zen
    uses: ./.github/workflows/build.yml
    with:
      publish_release: false
    secrets: inherit

  firefox:
    name: Build Firefox
    uses: ./.github/workflows/build-firefox.yml
    with:
      publish_release: false
    secrets: inherit

  firefox_esr:
    name: Build Firefox ESR
    uses: ./.github/workflows/build-firefox-esr.yml
    with:
      publish_release: false
    secrets: inherit

  publish_combined_release:
    name: Publish Combined Latest Release
    runs-on: [self-hosted, Linux, X64]
    needs:
      - zen
      - firefox
      - firefox_esr
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Show collected artifacts
        run: |
          ls -lah release || true
          find release -type f -maxdepth 2 | sort || true

      - name: Publish GitHub release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: all-browsers-build-${{ github.run_number }}
          name: All Browsers Build ${{ github.run_number }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/**/*
