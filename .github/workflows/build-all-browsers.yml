name: Build All Browsers (Zen + Firefox + Firefox ESR + Floorp)

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  zen:
    name: Build Zen
    uses: ./.github/workflows/build.yml
    with:
      publish_release: false
    secrets: inherit

  firefox:
    name: Build Firefox
    uses: ./.github/workflows/build-firefox.yml
    with:
      publish_release: false
    secrets: inherit

  firefox_esr:
    name: Build Firefox ESR
    uses: ./.github/workflows/build-firefox-esr.yml
    with:
      publish_release: false
    secrets: inherit

  floorp:
    name: Build Floorp
    uses: ./.github/workflows/build-floorp.yml
    with:
      publish_release: false
    secrets: inherit

  publish_combined_release:
    name: Publish Combined Latest Release
    runs-on: [self-hosted, Linux, X64]
    needs:
      - zen
      - firefox
      - firefox_esr
      - floorp
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Show collected artifacts
        run: |
          ls -lah release || true
          find release -type f -maxdepth 2 | sort || true

      - name: Publish GitHub release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browsers-latest
          name: Browsers
          make_latest: true
          overwrite_files: true
          generate_release_notes: true
          files: |
            release/**/*

      - name: Dispatch downstream workflow (optional)
        if: ${{ success() }}
        env:
          TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
          TARGET_OWNER: ${{ vars.CROSS_REPO_OWNER }}
          TARGET_REPO: ${{ vars.CROSS_REPO_NAME }}
          TARGET_WORKFLOW: ${{ vars.CROSS_REPO_WORKFLOW_FILE }}
          TARGET_REF: ${{ vars.CROSS_REPO_WORKFLOW_REF }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ github.run_id }}
          SOURCE_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TOKEN:-}" ] || [ -z "${TARGET_OWNER:-}" ] || [ -z "${TARGET_REPO:-}" ] || [ -z "${TARGET_WORKFLOW:-}" ]; then
            echo "Skipping downstream dispatch: missing token or target repo/workflow vars."
            exit 0
          fi

          ref="${TARGET_REF:-main}"
          payload="$(cat <<EOF
          {
            \"ref\": \"$ref\",
            \"inputs\": {
              \"source_repo\": \"$SOURCE_REPO\",
              \"source_run_id\": \"$SOURCE_RUN_ID\",
              \"source_sha\": \"$SOURCE_SHA\"
            }
          }
          EOF
          )"

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$TARGET_OWNER/$TARGET_REPO/actions/workflows/$TARGET_WORKFLOW/dispatches" \
            -d "$payload"
